<html lang="ko">
<head>
<meta charset="UTF-8" />

<style>
:root{
  --bg:#15131F;--bg-2:#1B1830;--surface:#211D36;--surface-2:#2A2542;
  --line:#37314F;--line-soft:#2C2742;
  --text:#F3EEE6;--text-dim:#A79FB8;--text-faint:#716A86;
  --amber:#F7B05B;--amber-bright:#FFC978;--coral:#FF6B81;--coral-bright:#FF8DA0;
  --amber-soft:rgba(247,176,91,.13);--coral-soft:rgba(255,107,129,.13);
  --grad:linear-gradient(135deg,#FFC978,#FF6B81);
  --mono:'Space Mono',ui-monospace,SFMono-Regular,Menlo,monospace;
  --sans:'Pretendard',system-ui,-apple-system,'Apple SD Gothic Neo',sans-serif;
  --r:16px;--r-sm:11px;--maxw:560px;
}
*{box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:100%}
body{
  font-family:var(--sans);background:var(--bg);color:var(--text);line-height:1.55;
  -webkit-font-smoothing:antialiased;overflow-x:hidden;
  background-image:
    radial-gradient(900px 480px at 50% -8%, rgba(255,107,129,.10), transparent 60%),
    radial-gradient(700px 420px at 90% 6%, rgba(247,176,91,.10), transparent 55%);
  background-attachment:fixed;
}
a{color:inherit;text-decoration:none}
:focus-visible{outline:2px solid var(--amber-bright);outline-offset:3px;border-radius:6px}
.wrap{max-width:var(--maxw);margin:0 auto;padding:0 18px}

.site-header{position:sticky;top:0;z-index:30;backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);background:rgba(21,19,31,.72);border-bottom:1px solid var(--line-soft)}
.site-header .bar{max-width:var(--maxw);margin:0 auto;padding:13px 18px;display:flex;align-items:center;justify-content:space-between;gap:10px}
.brand{display:flex;align-items:center;gap:9px;flex:none}
.brand .disc{width:18px;height:18px;border-radius:50%;background:radial-gradient(circle,var(--amber) 0 30%,#0e0c15 32%);box-shadow:0 0 0 2px #0e0c15,0 0 14px rgba(247,176,91,.5);animation:spin 6s linear infinite}
.brand b{font-family:var(--mono);font-weight:700;font-size:16px;letter-spacing:.04em}
.brand b span{color:var(--amber)}
.nav{display:flex;gap:1px;overflow-x:auto;-ms-overflow-style:none;scrollbar-width:none}
.nav::-webkit-scrollbar{display:none}
.nav a{font-size:12.5px;color:var(--text-dim);font-weight:600;padding:6px 8px;border-radius:99px;transition:.18s;white-space:nowrap}
.nav a:hover{color:var(--text);background:var(--surface)}

.hero{padding:30px 0 8px}
.eyebrow{font-family:var(--mono);font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:var(--amber);display:flex;align-items:center;gap:8px}
.eyebrow::before{content:"";width:22px;height:1px;background:var(--amber);opacity:.7}
.next-card{margin-top:14px;position:relative;overflow:hidden;border-radius:var(--r);background:linear-gradient(180deg,var(--surface-2),var(--surface));border:1px solid var(--line);padding:22px 20px 20px;box-shadow:0 24px 60px -28px rgba(0,0,0,.7)}
.next-card .glow{position:absolute;inset:0;pointer-events:none;background:radial-gradient(420px 200px at 88% 0%,var(--amber-soft),transparent 70%)}
.next-top{display:flex;justify-content:space-between;align-items:flex-start;gap:14px;position:relative}
.next-date{font-family:var(--mono);line-height:1}
.next-date .d{font-size:clamp(40px,13vw,58px);font-weight:700;letter-spacing:-.02em}
.next-date .dow{display:flex;gap:8px;align-items:center;margin-top:8px;font-size:13px;color:var(--text-dim);letter-spacing:.16em}
.next-date .dow .kr{color:var(--coral);font-weight:700;font-family:var(--sans);font-size:15px;letter-spacing:0}
.dbadge{font-family:var(--sans);font-weight:700;font-size:11px;letter-spacing:0;padding:2px 8px;border-radius:99px;background:var(--coral);color:#fff}
.vinyl{flex:none;width:96px;height:96px;border-radius:50%;position:relative;background:repeating-radial-gradient(circle at center,rgba(255,255,255,.045) 0 1px,transparent 1px 4px),radial-gradient(circle at 38% 32%,rgba(255,255,255,.10),transparent 42%),#0d0b14;box-shadow:inset 0 0 0 1px rgba(255,255,255,.05),0 10px 30px -10px rgba(0,0,0,.8);animation:spin 7s linear infinite}
.vinyl::before{content:"";position:absolute;inset:34%;border-radius:50%;background:var(--grad)}
.vinyl::after{content:"";position:absolute;inset:47%;border-radius:50%;background:var(--bg)}
.next-place{margin-top:18px;position:relative}
.next-place .name{font-size:22px;font-weight:800;letter-spacing:-.01em;line-height:1.25}
.next-place .sub{color:var(--text-dim);font-size:13.5px;margin-top:5px}
.next-place .sub b{color:var(--amber-bright);font-weight:700}
.facts{display:flex;gap:8px;margin-top:16px;position:relative}
.fact{flex:1;background:var(--bg-2);border:1px solid var(--line-soft);border-radius:var(--r-sm);padding:11px 12px}
.fact .k{font-family:var(--mono);font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--text-faint)}
.fact .v{font-weight:700;font-size:15px;margin-top:4px}
.fact .v small{font-family:var(--mono);font-weight:400;color:var(--text-dim);font-size:12px}
.countdown{margin-top:16px;padding-top:16px;border-top:1px solid var(--line-soft);position:relative}
.countdown .lbl{font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--text-faint);font-family:var(--mono)}
.cd-grid{display:flex;gap:8px;margin-top:9px}
.cd-cell{flex:1;text-align:center;background:var(--bg-2);border:1px solid var(--line-soft);border-radius:var(--r-sm);padding:10px 4px 8px}
.cd-cell .v{font-family:var(--mono);font-weight:700;font-size:clamp(20px,6vw,26px);line-height:1}
.cd-cell .u{font-size:10px;color:var(--text-faint);letter-spacing:.1em;margin-top:5px}
.cd-live{font-weight:800;font-size:19px;color:var(--coral-bright);display:flex;align-items:center;gap:9px;margin-top:6px}
.cd-live .pulse{width:9px;height:9px;border-radius:50%;background:var(--coral);animation:pulse 1.3s ease-in-out infinite}
.next-actions{display:flex;gap:8px;margin-top:18px;position:relative}
.btn{flex:1;text-align:center;font-weight:700;font-size:14px;padding:12px;border-radius:var(--r-sm);transition:.18s;cursor:pointer;border:1px solid transparent}
.btn-primary{background:var(--grad);color:#1a1119}
.btn-primary:hover{filter:brightness(1.06)}
.btn-ghost{background:transparent;border-color:var(--line);color:var(--text)}
.btn-ghost:hover{background:var(--surface);border-color:var(--surface-2)}

.section{padding:34px 0 4px;scroll-margin-top:64px}
.sec-head{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:16px}
.sec-head h2{font-size:20px;font-weight:800;letter-spacing:-.01em}
.sec-head .en{font-family:var(--mono);font-size:11px;color:var(--text-faint);letter-spacing:.2em;text-transform:uppercase}

.timeline{position:relative;padding-left:6px}
.tl{display:flex;gap:14px;position:relative;padding-bottom:18px}
.tl:last-child{padding-bottom:0}
.tl::before{content:"";position:absolute;left:43px;top:8px;bottom:-6px;width:2px;background:var(--line-soft)}
.tl:last-child::before{display:none}
.tl .t{flex:none;width:48px;text-align:right;font-family:var(--mono);font-weight:700;font-size:14px;color:var(--amber-bright);padding-top:1px}
.tl .dot{flex:none;width:11px;height:11px;border-radius:50%;background:var(--surface);border:2px solid var(--amber);margin-top:4px;z-index:1}
.tl.lead .dot{background:var(--amber);box-shadow:0 0 10px var(--amber)}
.tl .c .ti{font-weight:700;font-size:15px}
.tl .c .de{font-size:13px;color:var(--text-dim);margin-top:2px}

.card{background:var(--surface);border:1px solid var(--line-soft);border-radius:var(--r);padding:6px 16px}
.irow{display:flex;gap:13px;padding:14px 0;border-bottom:1px solid var(--line-soft)}
.irow:last-child{border-bottom:none}
.irow .ic{flex:none;font-size:18px;width:22px;text-align:center;line-height:1.5}
.irow .body{flex:1;min-width:0}
.irow .k{font-size:12px;color:var(--text-faint);font-family:var(--mono);letter-spacing:.08em;text-transform:uppercase}
.irow .v{font-weight:700;font-size:15.5px;margin-top:3px}
.irow .v.lite{font-weight:600;font-size:14.5px}
.irow .d{font-size:13px;color:var(--text-dim);margin-top:5px;line-height:1.55}
.irow .maplink{display:inline-flex;align-items:center;gap:5px;margin-top:8px;font-size:12.5px;font-weight:700;color:var(--amber);font-family:var(--mono);letter-spacing:.04em}
.irow .maplink:hover{color:var(--amber-bright)}

/* 공연 단일 카드 */
.show-card{background:linear-gradient(160deg,var(--amber-soft),var(--surface));border:1px solid rgba(247,176,91,.35);border-radius:var(--r);padding:24px 20px;text-align:center}
.show-emo{font-size:24px}
.show-time{font-family:var(--mono);font-weight:700;font-size:clamp(28px,9vw,38px);color:var(--amber-bright);margin-top:6px;letter-spacing:-.01em}
.show-loc{font-size:16px;font-weight:700;margin-top:8px}
.show-note{font-size:12.5px;color:var(--text-dim);margin-top:5px;font-family:var(--mono);letter-spacing:.03em}

.mgroup{margin-bottom:20px}
.mgroup:last-child{margin-bottom:0}
.mg-head{display:flex;align-items:baseline;gap:9px;margin-bottom:11px}
.mg-head .h{font-weight:800;font-size:15.5px}
.mg-head .cnt{font-family:var(--mono);font-size:13px;color:var(--amber);font-weight:700}
.mg-head .note{font-size:11.5px;color:var(--text-faint);margin-left:auto}
.staff-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:8px}
.supp-list{display:grid;grid-template-columns:1fr;gap:8px}
.staff{display:flex;align-items:center;gap:12px;background:linear-gradient(160deg,var(--amber-soft),var(--surface));border:1px solid rgba(247,176,91,.3);border-radius:var(--r);padding:12px 14px}
.staff .ava{flex:none;width:38px;height:38px;border-radius:50%;display:grid;place-items:center;font-weight:800;font-size:16px;color:#1a1119;background:var(--grad)}
.staff .nm{font-weight:700;font-size:15px}
.staff .rl{font-size:11.5px;color:var(--amber-bright);margin-top:1px;font-weight:600}
.chips{display:flex;flex-wrap:wrap;gap:6px}
.chip{font-size:13px;font-weight:600;padding:5px 11px;border-radius:99px;background:var(--surface);border:1px solid var(--line);color:var(--text)}
.chip.drv{background:var(--amber-soft);border-color:rgba(247,176,91,.4);color:var(--amber-bright)}

.tgroup{background:var(--surface);border:1px solid var(--line-soft);border-radius:var(--r);padding:13px 15px;margin-top:8px}
.tg-head{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.tg-emo{font-size:17px}
.tg-lead{font-weight:700;font-size:14.5px}
.tg-lead b{color:var(--amber-bright)}
.tg-cnt{margin-left:auto;font-family:var(--mono);font-size:12px;color:var(--text-faint)}
.subhead{display:flex;align-items:baseline;gap:9px;margin:18px 0 4px}
.subhead .h{font-weight:800;font-size:15px}
.subhead .cnt{font-family:var(--mono);font-size:12.5px;color:var(--amber);font-weight:700}

.tel-btn{display:flex;align-items:center;justify-content:center;gap:9px;margin-top:12px;font-weight:800;font-size:16px;padding:14px;border-radius:var(--r-sm);background:var(--grad);color:#1a1119;transition:.18s}
.tel-btn:hover{filter:brightness(1.06)}
.tel-btn .num{font-family:var(--mono);letter-spacing:.02em}

.site-footer{margin-top:44px;padding:26px 0 40px;border-top:1px solid var(--line-soft);text-align:center}
.site-footer .fbrand{font-family:var(--mono);font-weight:700;letter-spacing:.04em}
.site-footer .fbrand span{color:var(--amber)}
.site-footer .ftag{font-size:13px;color:var(--text-dim);margin-top:6px}
.site-footer .updated{font-size:11px;color:var(--text-faint);margin-top:16px;font-family:var(--mono);letter-spacing:.05em}

@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.35;transform:scale(.7)}}
@media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
</style>
</head>
<body>

<header class="site-header">
  <div class="bar">
    <a class="brand" href="#top"><span class="disc"></span><b>N<span>.</span>ROUND</b></a>
    <nav class="nav">
      <a href="#meet">집합</a>

    </nav>

<main class="wrap" id="top">

  <section class="hero">
    <div class="eyebrow">0620 BUSKING</div>
    <div id="heroSlot"></div>
  </section>

  <section class="section" id="flow">
    <div class="sec-head"><h2>오늘의 흐름</h2><span class="en">Timeline</span></div>
    <div class="timeline" id="timeline"></div>
  </section>

  <section class="section" id="meet">
    <div class="sec-head"><h2>집합 안내</h2><span class="en">Meet</span></div>
    <div class="card" id="meetCard"></div>
  </section>

  <section class="section" id="show">
    <div class="sec-head"><h2>공연 일정</h2><span class="en">Show</span></div>
    <div id="showSlot"></div>
  </section>

  <section class="section" id="crew">
    <div class="sec-head"><h2>참여 멤버</h2><span class="en">Crew</span></div>
    <div id="crewSlot"></div>
  </section>

  <section class="section" id="after">
    <div class="sec-head"><h2>뒤풀이</h2><span class="en">After</span></div>
    <div id="afterSlot"></div>
  </section>

  <section class="section" id="contact">

</main>

<footer class="site-footer">
  <div class="wrap">
    <div class="fbrand">N<span>.</span>ROUND</div>

    <div class="updated" id="updated"></div>
  </div>
</footer>

<script>
/* ============================================================
   ⬇️⬇️⬇️  여기만 수정하면 됩니다  ⬇️⬇️⬇️
   ============================================================ */

const EVENT = {
  date: "2026-06-20",

  meetTime: "17:30",
  meetPlace: "자양역 2번 출구 컴포즈 커피",
  meetMapUrl: "https://naver.me/G1pIiHdx",

  showStart: "18:30", showEnd: "20:00",
  showPlace: "청담대교 북단 하부",

  parkingName: "뚝섬 한강 공원 제3주차장",
  parkingMapUrl: "https://map.naver.com/p/entry/place/36028581?placePath=%2Fhome",

  contactName: "운영장 전시안",
  contactPhone: "010-4995-1180",

  groupChatUrl: "",   // 단톡방 링크 있으면 넣기
};

// 운영진
const LEADERSHIP = [
  { name: "전시안", role: "운영장" },
  { name: "이령서", role: "부운영장" },
  { name: "양여명", role: "서포터즈 리더" },
];

// 일일 서포터즈 (담당)
const SUPPORTERS = [
  { name: "김동규", role: "버스킹 진행 · 이동 시 멤버 체크" },
  { name: "라현철", role: "음향 진행 · 차량 지원" },
];

// 공연 참여 12명
const PERFORMERS = ["온승찬","류창현","황희대","한정우","전혜인","이현빈","홍주연","한승아","이윤서","김영돈","이지혁","이승은"];

// 공연 관람
const AUDIENCE = ["양충근","조영진","홍영훈"];

// 뒤풀이
const AFTER = {
  place: "화기애애 건대",
  placeUrl: "https://naver.me/FBe2ucIz",
  booker: "전지수",
  time: "21:00",
  parking: "건국대병원 주차장",
  parkingNote: "당일 구매 필요",
  parkingUrl: "https://map.naver.com/p/search/건국대학교병원 주차장",
  groups: [
    { type:"car",  lead:"전시안", members:["전시안","홍주연","한승아","이승은"] },
    { type:"car",  lead:"이령서", members:["이령서","김동규","이현빈","이윤서","이지혁","홍영훈"] },
    { type:"car",  lead:"라현철", members:["라현철","류창현","조영진","김영돈"] },
    { type:"taxi", lead:"양여명", members:["양여명","온승찬","한정우","양충근"] },
  ],
};

/* ============================================================
   ⬆️⬆️⬆️  수정 끝  ⬆️⬆️⬆️
   ============================================================ */

const DOW_KR=["일","월","화","수","목","금","토"];
const pad=n=>String(n).padStart(2,"0");
const dt=(d,t)=>new Date(`${d}T${(t||"00:00")}:00`);
const tel=p=>"tel:"+p.replace(/[^0-9]/g,"");

const start=dt(EVENT.date,EVENT.meetTime);
const showEnd=dt(EVENT.date,EVENT.showEnd);
const day=start.getDay();

function dayBadge(){
  const t=new Date(), a=new Date(EVENT.date+"T00:00:00");
  const diff=Math.round((a-new Date(t.getFullYear(),t.getMonth(),t.getDate()))/86400e3);
  if(diff===0) return '<span class="dbadge">오늘</span>';
  if(diff===1) return '<span class="dbadge">내일</span>';
  if(diff>1) return `<span class="dbadge">D-${diff}</span>`;
  return '';
}

function renderHero(){
  document.getElementById("heroSlot").innerHTML=`
  <div class="next-card">
    <div class="glow"></div>
    <div class="next-top">
      <div class="next-date">
        <div class="d">${pad(start.getMonth()+1)}.${pad(start.getDate())}</div>
        <div class="dow"><span class="kr">${DOW_KR[day]}요일</span>${dayBadge()}</div>
      </div>
      <div class="vinyl"></div>
    </div>
    <div class="next-place">
      <div class="name">${EVENT.meetPlace}</div>
      <div class="sub">🎤 공연 · <b>${EVENT.showPlace}</b></div>
    </div>
    <div class="facts">
      <div class="fact"><div class="k">집합</div><div class="v">${EVENT.meetTime}<small> 자양역</small></div></div>
      <div class="fact"><div class="k">공연</div><div class="v">${EVENT.showStart}<small> – ${EVENT.showEnd}</small></div></div>
    </div>
    <div class="countdown"><div class="lbl" id="cdLbl">집합까지</div><div id="cdBody"></div></div>
    <div class="next-actions">
      <a class="btn btn-primary" target="_blank" rel="noopener" href="${EVENT.meetMapUrl}">📍 집합 위치 길찾기</a>
      <a class="btn btn-ghost" href="#contact">📞 문의</a>
    </div>
  </div>`;
  tick();
}

let timer;
function tick(){
  const body=document.getElementById("cdBody"); if(!body) return;
  const now=new Date(), diff=start-now;
  if(diff<=0){
    const live=now<=showEnd;
    document.getElementById("cdLbl").textContent=live?"진행 중":"";
    body.innerHTML=live
      ? '<div class="cd-live"><span class="pulse"></span>버스킹 진행 중 🎤</div>'
      : '<div class="cd-live">오늘 공연 종료 · 수고하셨습니다 🎉</div>';
    if(!live) clearInterval(timer);
    return;
  }
  const d=Math.floor(diff/86400e3),h=Math.floor(diff%86400e3/3600e3),m=Math.floor(diff%3600e3/60e3),s=Math.floor(diff%60e3/1e3);
  body.innerHTML=`<div class="cd-grid">
    <div class="cd-cell"><div class="v">${d}</div><div class="u">DAYS</div></div>
    <div class="cd-cell"><div class="v">${pad(h)}</div><div class="u">HRS</div></div>
    <div class="cd-cell"><div class="v">${pad(m)}</div><div class="u">MIN</div></div>
    <div class="cd-cell"><div class="v">${pad(s)}</div><div class="u">SEC</div></div>
  </div>`;
}

function renderTimeline(){
  const rows=[
    {t:EVENT.meetTime, ti:"집합", de:EVENT.meetPlace, lead:true},
    {t:EVENT.showStart, ti:"공연 시작", de:EVENT.showPlace, lead:true},
    {t:EVENT.showEnd, ti:"공연 마무리", de:"뒤풀이 이동"},
    {t:AFTER.time, ti:"뒤풀이", de:AFTER.place},
  ];
  document.getElementById("timeline").innerHTML=rows.map(r=>`
    <div class="tl ${r.lead?'lead':''}">
      <div class="t">${r.t}</div><div class="dot"></div>
      <div class="c"><div class="ti">${r.ti}</div><div class="de">${r.de}</div></div>
    </div>`).join("");
}

function renderMeet(){
  document.getElementById("meetCard").innerHTML=`
    <div class="irow"><div class="ic">📍</div><div class="body">
      <div class="k">집합 장소</div><div class="v">${EVENT.meetPlace}</div>
      <a class="maplink" target="_blank" rel="noopener" href="${EVENT.meetMapUrl}">지도에서 보기 ↗</a>
    </div></div>
    <div class="irow"><div class="ic">⏰</div><div class="body">

    </div></div>
    <div class="irow"><div class="ic">🅿️</div><div class="body">
      <div class="k">주차</div><div class="v lite">${EVENT.parkingName}</div>
      <div class="d">초대 손님 또는 주차 필요하신 분은 가장 가까운 이 주차장을 이용해주세요.</div>
      <a class="maplink" target="_blank" rel="noopener" href="${EVENT.parkingMapUrl}">주차장 위치 ↗</a>
    </div></div>`;
}

function renderShow(){
  document.getElementById("showSlot").innerHTML=`
    <div class="show-card">
      <div class="show-emo">🎤</div>
      <div class="show-time">${EVENT.showStart} – ${EVENT.showEnd}</div>
      <div class="show-loc">📍 ${EVENT.showPlace}</div>
      <div class="show-note">오후 6시 30분 ~ 8시</div>
    </div>`;
}

const chipCloud=(arr,driver)=>`<div class="chips">${arr.map(n=>`<span class="chip${n===driver?' drv':''}">${n}</span>`).join("")}</div>`;

function renderCrew(){
  const staffCard=s=>`<div class="staff"><div class="ava">${s.name.slice(0,1)}</div>
        <div><div class="nm">${s.name}</div><div class="rl">${s.role}</div></div></div>`;
  document.getElementById("crewSlot").innerHTML=`
    <div class="mgroup">
      <div class="mg-head"><span class="h">운영진</span><span class="cnt">${LEADERSHIP.length}명</span></div>
      <div class="staff-grid">${LEADERSHIP.map(staffCard).join("")}</div>
    </div>
    <div class="mgroup">
      <div class="mg-head"><span class="h">일일 서포터즈</span><span class="cnt">${SUPPORTERS.length}명</span></div>
      <div class="supp-list">${SUPPORTERS.map(staffCard).join("")}</div>
    </div>
    <div class="mgroup">
      <div class="mg-head"><span class="h">공연 참여</span><span class="cnt">${PERFORMERS.length}명</span></div>
      ${chipCloud(PERFORMERS)}
    </div>
    <div class="mgroup">
      <div class="mg-head"><span class="h">공연 관람</span><span class="cnt">${AUDIENCE.length}명</span></div>
      ${chipCloud(AUDIENCE)}
    </div>`;
}

function renderAfter(){
  const total=new Set(AFTER.groups.flatMap(g=>g.members)).size;
  const groupsHTML=AFTER.groups.map(g=>{
    const emo=g.type==="taxi"?"🚕":"🚗";
    const kind=g.type==="taxi"?"택시":"차량";
    return `<div class="tgroup">
      <div class="tg-head"><span class="tg-emo">${emo}</span>
        <span class="tg-lead"><b>${g.lead}</b> ${kind}</span>
        <span class="tg-cnt">${g.members.length}명</span></div>
      ${chipCloud(g.members,g.lead)}
    </div>`;
  }).join("");

  document.getElementById("afterSlot").innerHTML=`
    <div class="card">
      <div class="irow"><div class="ic">📍</div><div class="body">
        <div class="k">장소</div><div class="v">${AFTER.place}</div>
        <a class="maplink" target="_blank" rel="noopener" href="${AFTER.placeUrl}">지도에서 보기 ↗</a>
      </div></div>
      <div class="irow"><div class="ic">🕘</div><div class="body">
        <div class="k">시간</div><div class="v">오후 9시 (${AFTER.time})</div>
      </div></div>
      <div class="irow"><div class="ic">📝</div><div class="body">
        <div class="k">예약자</div><div class="v lite">${AFTER.booker}</div>
      </div></div>
      <div class="irow"><div class="ic">🅿️</div><div class="body">
        <div class="k">주차</div><div class="v lite">${AFTER.parking}</div>
        <div class="d">${AFTER.parkingNote}</div>
        <a class="maplink" target="_blank" rel="noopener" href="${AFTER.parkingUrl}">주차장 위치 ↗</a>
      </div></div>
    </div>
    <div class="subhead"><span class="h">이동 배정</span><span class="cnt">총 ${total}명</span></div>
    ${groupsHTML}`;
}

function renderContact(){
  const chat=EVENT.groupChatUrl
    ? `<a class="maplink" target="_blank" rel="noopener" href="${EVENT.groupChatUrl}">단톡방 열기 ↗</a>` : "";
  document.getElementById("contactCard").innerHTML=`
    <div class="irow"><div class="ic">💬</div><div class="body">
      <div class="k">일반 문의</div><div class="v lite">단톡방에 남겨주세요</div>
      <div class="d">일정 변경, 위치 확인 등 궁금한 점은 단톡방에 올려주시면 됩니다.</div>${chat}
    </div></div>
    <div class="irow"><div class="ic">📞</div><div class="body">
      <div class="k">급하거나 확인이 필요할 때</div><div class="v lite">${EVENT.contactName}</div>
      <a class="tel-btn" href="${tel(EVENT.contactPhone)}"><span>📞</span><span class="num">${EVENT.contactPhone}</span></a>
    </div></div>`;
}

renderHero(); renderTimeline(); renderMeet(); renderShow(); renderCrew(); renderAfter(); renderContact();
const _t=new Date();
document.getElementById("updated").textContent=`최종 업데이트 ${_t.getFullYear()}.${pad(_t.getMonth()+1)}.${pad(_t.getDate())}`;
timer=setInterval(tick,1000);
document.querySelectorAll('a[href^="#"]').forEach(a=>{
  a.addEventListener("click",e=>{const el=document.querySelector(a.getAttribute("href"));if(el){e.preventDefault();el.scrollIntoView({behavior:"smooth",block:"start"});}});
});
</script>
